version: 1
updated: "2026-05-02"
language: "zh-Hant"

global:
  default_task_for_new_upload: "ingest"
  default_cross_compare_scope: "same_kol_only"
  no_buy_sell_advice: true
  quote_requires_source: true
  abort_on_truncated_or_unclear_content: true
  max_core_concepts: 3
  max_cross_references_per_article: 2
  source_id_pattern: "KOL_OR_SOURCE-YYYYMMDD-title-slug-short_hash"
  raw_filename_pattern: "YYYYMMDD_KOL_OR_SOURCE_title_slug_source_id.ext"
  combined_note_body_order: "append_only"
  combined_note_index_order: "publish_date_desc"

